name: Apply PostgreSQL DDL

on:
  repository_dispatch:
    types:
      - apply-postgresql-ddl
  pull_request:
    paths:
      - "terraform/postgresql/**"
      - ".github/workflows/terraform-postgresql-ddl.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/postgresql/**"
      - ".github/workflows/terraform-postgresql-ddl.yml"
  workflow_dispatch:
    inputs:
      schema_name:
        description: "PostgreSQL schema name to create, for example trawlerowner_demo1"
        required: false
        type: string

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/postgresql

    env:
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}
      TF_VAR_org_id: ${{ github.event.client_payload.orgid || '' }}
      TF_VAR_schema_name: ${{ github.event.inputs.schema_name || github.event.client_payload.schemaName || github.event.client_payload.schema_name || github.event.client_payload.schemaname || github.event.client_payload.schema || github.event.client_payload.orgid || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: github.event_name != 'pull_request'
        run: terraform apply -auto-approve
