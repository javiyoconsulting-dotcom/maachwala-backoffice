name: Apply PostgreSQL DDL

on:
  repository_dispatch:
    types:
      - apply-postgresql-ddl
  pull_request:
    paths:
      - "terraform/postgresql/**"
      - ".github/workflows/terraform-postgresql-ddl.yml"
  push:
    branches:
      - main
    paths:
      - "terraform/postgresql/**"
      - ".github/workflows/terraform-postgresql-ddl.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform/postgresql

    env:
      TF_VAR_database_url: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: github.event_name != 'pull_request'
        run: terraform apply -auto-approve
