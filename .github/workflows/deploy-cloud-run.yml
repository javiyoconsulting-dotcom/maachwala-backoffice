name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: backoffice-microservice
  GCP_PROJECT_ID: maachwala
  GCP_PROJECT_NUMBER: "972943436476"
  GCP_REGION: asia-south1
  PUBSUB_CREATE_DDL_SUBSCRIPTION: BACKOFFICE_CREATEORG_CREATEDDL-sub

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --allow-unauthenticated \
            --set-env-vars "PGSSL=true,DATABASE_URL=${{ secrets.DATABASE_URL }},GH_DISPATCH_TOKEN=${{ secrets.GH_DISPATCH_TOKEN }},GITHUB_DISPATCH_REPOSITORY=javiyoconsulting-dotcom/maachwala-backoffice,GITHUB_DISPATCH_EVENT_TYPE=apply-postgresql-ddl" \
            --quiet

      - name: Connect Pub/Sub subscription to Cloud Run endpoint
        run: |
          SERVICE_URL="$(gcloud run services describe "$SERVICE_NAME" \
            --project "$GCP_PROJECT_ID" \
            --region "$GCP_REGION" \
            --format 'value(status.url)')"

          gcloud pubsub subscriptions update "$PUBSUB_CREATE_DDL_SUBSCRIPTION" \
            --project "$GCP_PROJECT_ID" \
            --push-endpoint "$SERVICE_URL/backoffice/createddl/pubsub" \
            --quiet
